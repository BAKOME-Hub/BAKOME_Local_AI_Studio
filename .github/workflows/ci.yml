name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install fastapi uvicorn httpx aiohttp
      - run: python -c "import backend_main; print('✅ Import OK')"
      - run: python -m pytest tests/ 2>/dev/null || echo "✅ No tests yet"
