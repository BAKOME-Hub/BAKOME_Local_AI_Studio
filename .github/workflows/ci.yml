name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn httpx aiohttp aiofiles markdown reportlab pydantic 2>/dev/null || true
      - name: Verify Python compilation
        run: |
          python -m py_compile backend_main.py && echo "✅ backend OK"
          python -m py_compile ai_enhancements.py && echo "✅ AI module OK"
